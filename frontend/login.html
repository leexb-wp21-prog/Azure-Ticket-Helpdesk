<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickAid - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./auth.css" />
  </head>
  <body class="auth-page login-page">
    <main class="entra-layout">
      <section class="entra-panel">
        <h1>Welcome back👋 </h1>
        <p class="entra-subtitle">Use your campus account to access the service desk.</p>
        <!--  <p class="entra-subtitle">Manual sign in or continue with Microsoft Entra ID.</p> -->

        <form id="loginPageForm" novalidate>
          <label class="input-shell">
            <span>Username</span>
            <input id="loginUsername" type="text" placeholder="Enter your username" required autocomplete="username" />
            <small class="error" id="loginUsernameError"></small>
          </label>

          <label class="input-shell">
            <span>Password</span>
            <input id="loginPassword" type="password" placeholder="Enter your password" required autocomplete="current-password" />
            <small class="error" id="loginPasswordError"></small>
          </label>

          <button type="submit" class="signin-btn">Sign In</button>

          <div class="or-divider"><span>Or</span></div>

          <button type="button" id="loginMicrosoftBtn" class="entra-btn">
            <img class="entra-logo" src="./assets/Microsoft_Entra_ID_color_icon.png" alt="" aria-hidden="true" />
            <span>Sign In with Microsoft Entra ID</span>
          </button>

          <!-- REMOVE_IN_PRODUCTION: Temporary direct admin login for frontend testing only. -->
          <button type="button" id="loginAdminTestBtn" class="entra-btn secondary-admin-entry">
            <span>Admin console sign in</span>
          </button>
        </form>

        <div class="auth-links">
          <a href="./register.html">Go to register</a>
          <a href="./index.html">Back to dashboard</a>
        </div>
      </section>

      <section class="entra-hero" aria-hidden="true">
        <div class="hero-orb"></div>
        <div class="hero-orb hero-orb-2"></div>
        <div class="hero-orb hero-orb-3"></div>
        <div class="hero-bear-card">
          <div class="bear" id="loginBear">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="face">
              <div class="eye left">
                <span class="pupil" id="loginLeftEye"></span>
                <span class="lid"></span>
              </div>
              <div class="eye right">
                <span class="pupil" id="loginRightEye"></span>
                <span class="lid"></span>
              </div>
              <div class="cheek left"></div>
              <div class="cheek right"></div>
              <div class="mouth-area">
                <div class="nose"></div>
                <div class="mouth"></div>
              </div>
            </div>
            <div class="hand left"></div>
            <div class="hand right"></div>
          </div>
          <h2>Campus support, in one place</h2>
          <p>Submit requests, track updates, and coordinate helpdesk work securely.</p>
        </div>
      </section>
    </main>
    <script src="./auth.js" defer></script>
  </body>
</html>
