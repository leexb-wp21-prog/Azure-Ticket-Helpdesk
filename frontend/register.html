<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickAid - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./auth.css" />
  </head>
  <body class="auth-page register-page">
    <main class="entra-layout">
      <section class="entra-panel">
        <h1>Create account ✨</h1>
        <p class="entra-subtitle">Register manually or continue with Microsoft Entra ID.</p>
        <form id="registerPageForm" novalidate>
          <label class="input-shell">
            <span>Full name</span>
            <input id="registerName" type="text" placeholder="Your name" required autocomplete="name" />
            <small class="error" id="registerNameError"></small>
          </label>
          <label class="input-shell">
            <span>Email</span>
            <input id="registerEmail" type="email" placeholder="you@campus.edu" required autocomplete="email" />
            <small class="error" id="registerEmailError"></small>
          </label>
          <label class="input-shell">
            <span>Role</span>
            <select id="registerRole" required>
              <option value="user">Student</option>
              <option value="staff">Staff</option>
              <option value="admin">Admin</option>
            </select>
            <small class="error" id="registerRoleError"></small>
          </label>
          <label class="input-shell">
            <span>Password</span>
            <input id="registerPassword" type="password" placeholder="Create password" required autocomplete="new-password" />
            <small class="error" id="registerPasswordError"></small>
          </label>
          <p class="entra-subtitle hidden" id="registerApprovalNote" aria-live="polite"></p>

          <button type="submit" class="signin-btn">Register</button>

          <div class="or-divider"><span>Or</span></div>

          <button type="button" id="registerMicrosoftBtn" class="entra-btn">
            <img class="entra-logo" src="./assets/Microsoft_Entra_ID_color_icon.png" alt="" aria-hidden="true" />
            <span>Sign In with Microsoft Entra ID</span>
          </button>
        </form>
        <div class="auth-links">
          <a href="./login.html">Go to login</a>
          <a href="./index.html">Back to dashboard</a>
        </div>
      </section>
      <section class="entra-hero" aria-hidden="true">
        <div class="hero-orb"></div>
        <div class="hero-orb hero-orb-2"></div>
        <div class="hero-orb hero-orb-3"></div>
        <div class="hero-bear-card">
          <div class="bear" id="registerBear">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="face">
              <div class="eye left">
                <span class="pupil" id="registerLeftEye"></span>
                <span class="lid"></span>
              </div>
              <div class="eye right">
                <span class="pupil" id="registerRightEye"></span>
                <span class="lid"></span>
              </div>
              <div class="cheek left"></div>
              <div class="cheek right"></div>
              <div class="mouth-area">
                <div class="nose"></div>
                <div class="mouth"></div>
              </div>
            </div>
            <div class="hand left"></div>
            <div class="hand right"></div>
          </div>
          <h2>Campus support, in one place</h2>
          <p>Submit requests, track updates, and coordinate helpdesk work securely.</p>
        </div>
      </section>
    </main>
    <script src="./auth.js" defer></script>
  </body>
</html>
